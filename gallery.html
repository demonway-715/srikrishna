<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gallery | Sri Krishna Bakery & Hotel</title>

  <link rel="stylesheet" href="css/style.css" />

  <style>

    /* GALLERY PAGE */

    .gallery-banner-text {
      color: #ffffff;
      opacity: 0.85;
      margin-top: 10px;
      font-size: 1rem;
    }

    .bakery-gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .bakery-gallery-card {
      background: #ffffff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transition: 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .bakery-gallery-card:hover {
      transform: translateY(-6px);
    }

    /* THIS FIXES RANDOM IMAGE SIZES */

    .bakery-gallery-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #f4f4f4;
    }

    .bakery-gallery-content {
      padding: 16px;
      text-align: center;
    }

    .bakery-gallery-content h3 {
      font-size: 1.1rem;
      color: #ff4fa0;
      margin-bottom: 6px;
    }

    .bakery-gallery-content p {
      color: #666;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    /* IMAGE MODAL */

    .gallery-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .gallery-modal.show {
      display: flex;
    }

    .gallery-modal-content {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    .gallery-modal-content img {
      width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 18px;
      background: #ffffff;
    }

    .gallery-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #ff4fa0;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }

    @media (max-width: 768px) {

      .bakery-gallery-card img {
        height: 220px;
      }

    }

  </style>

</head>
<body>

  <!-- HEADER -->

  <header class="site-header">
    <div class="container navbar">

      <a href="index.html" class="brand">
        <span>Sri Krishna</span>
      </a>

      <button class="mobile-toggle" id="mobileToggle">☰</button>

      <nav class="nav-links" id="navLinks">

        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Order Now</a>
        <a href="contact.html">Contact</a>

      </nav>

    </div>
  </header>

  <!-- PAGE BANNER -->

  <section class="page-banner">

    <div class="container text-center">

      <h1>Our Bakery Gallery</h1>

      <h3>
        Sweet memories, delicious moments, and customer favorites from Sri Krishna Bakery & Hotel.
      </h3>

    </div>

  </section>

 <!-- GALLERY -->

<section class="section">

  <div class="container">

    <div class="bakery-gallery-grid">

      <!-- IMAGE 1 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery1.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 2 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery2.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 3 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery3.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 4 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery4.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 5 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery5.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 6 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery6.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 7 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery7.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 8 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery8.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 9 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery9.jpg" alt="Bakery Image">
      </div>

      <!-- IMAGE 10 -->
      <div class="bakery-gallery-card">
        <img src="assets/images/gallery10.jpg" alt="Bakery Image">
      </div>

    </div>

  </div>

</section>

      </div>

    </div>

  </section>

  <!-- IMAGE PREVIEW MODAL -->

  <div class="gallery-modal" id="galleryModal">

    <div class="gallery-modal-content">

      <button class="gallery-close" id="closeGallery">&times;</button>

      <img src="" id="galleryPreview" alt="Preview">

    </div>

  </div>

  <!-- FOOTER -->

  <footer class="footer">

    <div class="container text-center">

      <p>
        © <span class="current-year"></span>
        Sri Krishna Bakery & Hotel. All rights reserved.
      </p>

    </div>

  </footer>

  <!-- SCRIPT -->

  <script>

    const cards = document.querySelectorAll(".bakery-gallery-card");
    const modal = document.getElementById("galleryModal");
    const preview = document.getElementById("galleryPreview");
    const closeBtn = document.getElementById("closeGallery");

    cards.forEach(card => {

      card.addEventListener("click", () => {

        const image = card.querySelector("img");

        preview.src = image.src;

        modal.classList.add("show");

      });

    });

    closeBtn.addEventListener("click", () => {
      modal.classList.remove("show");
    });

    modal.addEventListener("click", (e) => {

      if(e.target === modal){

        modal.classList.remove("show");

      }

    });

  </script>

  <script src="js/main.js"></script>
  <script>
const mobileToggle = document.getElementById("mobileToggle");
const navLinks = document.getElementById("navLinks");

mobileToggle.addEventListener("click", () => {
  navLinks.classList.toggle("show");
});
</script>

</body>
</html>
